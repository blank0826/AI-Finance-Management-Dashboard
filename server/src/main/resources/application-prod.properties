# Production profile — activated by SPRING_PROFILES_ACTIVE=prod
server.port=8080
# Database — Railway PostgreSQL (all values come from env vars)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Ollama
app.ollama.base-url=${OLLAMA_BASE_URL}
app.ollama.model=${OLLAMA_MODEL:qwen2.5:7b}

# Cloudinary
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
app.cloudinary.api-key=${CLOUDINARY_API_KEY}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET}
app.cloudinary.enabled=true

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

management.endpoint.health.show-details=always


management.endpoints.web.exposure.include=*
management.health.db.enabled=false
management.endpoint.health.enabled=true
management.endpoints.web.base-path=/actuator

server.address=0.0.0.0